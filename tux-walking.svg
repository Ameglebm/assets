      <circle cx="-5" cy="-64" r="2" fill="#0e0e0e"/>
      <circle cx="6" cy="-64" r="2" fill="#0e0e0e"/>
      <circle cx="-6.5" cy="-65.5" r="1" fill="white" opacity="0.9"/>
